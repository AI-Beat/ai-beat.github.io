<header class="site-header">
  <div class="container header-inner">
    <div>
      <a class="brand" href="{{ "/" | relURL }}">
        <img class="brand-logo brand-logo-dark"
             src="{{ "asset/AI-Beat-horisontal.png" | relURL }}"
             alt="{{ .Site.Params.siteName }}">
        <img class="brand-logo brand-logo-light"
             src="{{ "asset/AI-Beat-horisontal-light.png" | relURL }}"
             alt="{{ .Site.Params.siteName }}">
      </a>
      <p class="tagline">{{ .Site.Params.tagline }}</p>
    </div>
    <nav class="nav">
      <a href="{{ "/news/" | relURL }}">Archive</a>
      <a href="{{ "/tags/" | relURL }}">Tags</a>
      <a href="{{ "/about/" | relURL }}">About</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle colour theme">
        <span aria-hidden="true">◑</span>
        <span class="toggle-label-light">Light</span>
        <span class="toggle-label-dark">Dark</span>
      </button>
    </nav>
  </div>
</header>
