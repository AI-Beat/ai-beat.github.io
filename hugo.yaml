baseURL: https://ai-beat.github.io/
languageCode: en-us
title: AI Beat
timeZone: Europe/Warsaw
enableRobotsTXT: true
summaryLength: 30

pagination:
  pagerSize: 10
  path: page

permalinks:
  news: /news/:year/:month/:slug/

markup:
  goldmark:
    renderer:
      unsafe: false
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ['\[', '\]']
            - ['$$', '$$']
          inline:
            - ['\(', '\)']

taxonomies:
  category: categories
  tag: tags

params:
  description: Agentic AI news and analysis.
  tagline: Agentic AI news, research notes, and industry analysis.
  latestCount: 10
  archivePageSize: 24
  siteName: AI Beat
